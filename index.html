<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLord | Fullstack Developer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background-color: #4a0000;
            color: white;
            scroll-behavior: smooth;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px border rgba(255, 255, 255, 0.1);
        }

        .glass-white {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            color: #4a0000;
        }

        .text-gradient {
            background: linear-gradient(to right, #ffffff, #ffcccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #330000;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

                { name: 'Express JS', icon: 'fa-server', cat: 'Backend' },
                { name: 'React', icon: 'fa-code', cat: 'Frontend' },

                { name: 'JavaScript', icon: 'fa-js', cat: 'Language' },
                { name: 'HTML', icon: 'fa-html5', cat: 'Frontend' },
                { name: 'Tailwind CSS', icon: 'fa-wind', cat: 'Design' },
                { name: 'Firebase', icon: 'fa-fire', cat: 'Cloud' },
                { name: 'REST APIs', icon: 'fa-link', cat: 'Backend' },
                { name: 'Vibe Coding', icon: 'fa-bolt', cat: 'Methodology' },
                { name: 'AI Integration', icon: 'fa-robot', cat: 'Intelligence' },
                { name: 'Python', icon: 'fa-brands fa-python', cat: 'Language' }

                {
                    title: "NTA Wallah NEET Academy",

                },
                {
                    title: "SkyNexus Studio",
                    url: "https://skynexus-studio.netlify.app",
                    desc: "Creative agency platform showcasing high-end digital design services.",
                    tags: ["Studio", "UI/UX", "Modern"]
                },
                {
                    title: "NEETxPaper",
                    url: "https://neetxpaper-skylord.netlify.app",
                    desc: "Dynamic question paper generator with custom filtration for medical students.",
                    tags: ["Tools", "Automation", "Education"]
                },
                {
                    title: "NEETxRT",
                    url: "https://neetxrt-skylord.netlify.app",
                    desc: "Real-time performance tracking and analytical dashboard for NEET preparation.",
                    tags: ["Analytics", "Real-time", "Dashboard"]
                },
                {
                    title: "NEET Test Hub",
                    url: "https://neettesthub.netlify.app",
                    desc: "Centralized testing environment featuring automated exam cycles and result tracking.",

                    </div>

                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${isScrolled ? 'py-4 bg-[#4a0000]/80 backdrop-blur-xl border-b border-white/5 shadow-2xl' : 'py-8 bg-transparent'}`}>

                    {/* Skills Section */}

                                <div className="h-1 w-12 bg-white rounded-full"></div>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                                {skills.map((skill, i) => (
                                    <div key={i} className="skill-card p-6 rounded-[2rem] glass border border-white/5 text-center transition-all group">
                                        <div className="mb-4 text-white/30 group-hover:text-white transition-colors duration-300">

                                            <div className="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/10">

                                            </div>

                                                <i className="fas fa-external-link-alt text-sm"></i>
                                            </a>
                                        </div>
                                        <h3 className="text-xl font-black mb-4 uppercase tracking-tight">{p.title}</h3>
                                        <p className="text-white/50 text-sm mb-8 leading-relaxed font-medium flex-grow">{p.desc}</p>
                                        <div className="flex flex-wrap gap-2">
                                            {p.tags.map((t, j) => (
                                                <span key={j} className="px-3 py-1 bg-white/5 rounded-full text-[9px] font-black uppercase tracking-widest text-white/60 border border-white/5">{t}</span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* About Section (Condensed) */}
                    <section id="about" className="py-32 px-6">
                        <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">
                            <div className="p-12 rounded-[4rem] glass border border-white/10 text-center">
                                <div className="text-[10rem] font-black opacity-5 leading-none">18</div>
                                <div className="mt-[-4rem]">
                                    <h3 className="text-2xl font-black uppercase mb-4">The Journey</h3>
                                    <p className="text-white/60 leading-relaxed italic">"From mastering the MERN stack to scaling physical peaks in the Himalayas, I believe in absolute commitment to the craft."</p>
                                </div>
                            </div>
                            <div className="space-y-6">
                                <div className="p-8 rounded-3xl glass border border-white/5">
                                    <div className="flex items-center gap-4 mb-3">
                                        <i className="fas fa-user-md text-white/40"></i>
                                        <h4 className="font-black uppercase text-sm tracking-widest">NEET Aspirant</h4>
                                    </div>
                                    <p className="text-white/50 text-sm">Combining medical logic with code execution.</p>
                                </div>
                                <div className="p-8 rounded-3xl glass border border-white/5">
                                    <div className="flex items-center gap-4 mb-3">
                                        <i className="fas fa-mountain text-white/40"></i>
                                        <h4 className="font-black uppercase text-sm tracking-widest">Mountaineer</h4>
                                    </div>
                                    <p className="text-white/50 text-sm">Always aiming for the next highest elevation.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}

                                <h2 className="text-4xl md:text-6xl font-black mb-6 tracking-tighter uppercase italic">Start the vibe.</h2>
                                <p className="text-[#4a0000]/60 mb-12 font-bold uppercase tracking-[0.2em] text-sm">Open for serious development inquiries & AI implementation.</p>
                                
                                <div className="flex flex-col items-center gap-6">
                                    <a href="mailto:SkyLord31@proton.me" className="group w-full bg-[#4a0000] text-white p-8 rounded-[3rem] transition-all hover:scale-[1.02] shadow-2xl flex flex-col items-center gap-2">
                                        <span className="text-[10px] font-black uppercase tracking-[0.4em] opacity-40">Direct Connection</span>
                                        <span className="text-lg md:text-2xl font-black break-all">SkyLord31@proton.me</span>
                                    </a>
                                    
                                    <div className="flex gap-6 pt-6">
                                        <a href="#" className="text-2xl hover:scale-125 transition-all"><i className="fab fa-github"></i></a>
                                        <a href="#" className="text-2xl hover:scale-125 transition-all"><i className="fab fa-twitter"></i></a>
                                        <a href="#" className="text-2xl hover:scale-125 transition-all"><i className="fab fa-linkedin"></i></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-20 text-center border-t border-white/5">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="w-10 h-10 bg-white text-[#4a0000] rounded-xl flex items-center justify-center font-black text-xl mx-auto mb-8">CC</div>
                            <p className="text-white/20 text-[10px] tracking-[0.6em] uppercase font-black">Chaitanya Chavhan • Crafted for performance</p>
                            <div className="mt-8 flex justify-center gap-6 text-[9px] font-bold uppercase tracking-widest opacity-20">
                                <span>React v18</span>
                                <span>Tailwind CSS</span>
                                <span>Zero Build Step</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
